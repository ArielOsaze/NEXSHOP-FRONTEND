<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexShop Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="d-flex">

<aside class="sidebar bg-dark text-white p-3">
    <h3 class="mb-4">NexShop</h3>

    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link text-white active" href="#"><i class="bi bi-grid me-2"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-box me-2"></i>Products</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-cart me-2"></i>Orders</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-people me-2"></i>Users</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
    </ul>

    <button onclick="logout()" class="btn btn-danger w-100 mt-5">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
</aside>

<main class="flex-grow-1 p-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2>Dashboard</h2>
        <p class="text-muted mb-0">Selamat datang di Admin NexShop</p>
    </div>

    <div class="d-flex gap-2">
        <input id="search" class="form-control" placeholder="Cari produk...">
        <button
    class="btn btn-success"
    data-bs-toggle="modal"
    data-bs-target="#productModal">

    <i class="bi bi-plus-circle"></i>
    Tambah Produk

</button>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-lg-4">
        <div class="card shadow-sm"><div class="card-body">
            <small>Total Produk</small>
            <h2 id="totalProduk">0</h2>
        </div></div>
    </div>

    <div class="col-lg-4">
        <div class="card shadow-sm"><div class="card-body">
            <small>Total Sold</small>
            <h2 id="totalSold">0</h2>
        </div></div>
    </div>

    <div class="col-lg-4">
        <div class="card shadow-sm"><div class="card-body">
            <small>Total Nilai</small>
            <h2 id="totalHarga">Rp 0</h2>
        </div></div>
    </div>
</div>

<div class="card shadow-sm">
<div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Daftar Produk</h5>
    <button onclick="loadProducts()" class="btn btn-primary btn-sm">
        <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
</div>

<div class="table-responsive">
<table class="table table-hover align-middle mb-0">
<thead>
<tr>
<th>ID</th>
<th>Gambar</th>
<th>Nama</th>
<th>Harga</th>
<th>Badge</th>
<th>Kategori</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="products">
</tbody>

</table>
</div>
</div>

</main>
</div>

<!-- Product Modal -->

<div class="modal fade" id="productModal" tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title" id="modalTitle">

<i class="bi bi-box-seam me-2"></i>

Tambah Produk

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<form id="productForm">

<div class="row g-3">

<div class="col-md-6">

<label class="form-label">Nama Produk</label>

<input
id="name"
class="form-control"
required>

</div>

<div class="col-md-6">

<label class="form-label">Harga</label>

<input
id="price"
type="number"
class="form-control"
required>

</div>

<div class="col-md-6">

<label class="form-label">Badge</label>

<input
id="badge"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">Kategori</label>

<input
id="category"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">Rating</label>

<input
id="rating"
type="number"
step="0.1"
min="0"
max="5"
placeholder="Contoh: 4.9"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">Sold</label>

<input
id="sold"
type="number"
class="form-control">

</div>

<div class="col-12">

<label class="form-label">
Gambar Produk
</label>

<input
type="file"
id="image"
class="form-control"
accept="image/*">

<img
id="previewImage"
src=""
class="img-thumbnail mt-3 d-none"
style="max-height:180px;">

</div>

<div class="col-12">

<label class="form-label">

Deskripsi

</label>

<textarea
id="description"
rows="4"
class="form-control"></textarea>

</div>

</div>

</form>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Batal

</button>

<button
class="btn btn-success"
onclick="saveProduct()">

<i class="bi bi-floppy"></i>

Simpan Produk

</button>

</div>

</div>

</div>

</div>

<div class="toast-container position-fixed top-0 end-0 p-3">

<div
id="liveToast"
class="toast">

<div class="toast-header">

<strong class="me-auto">

NexShop

</strong>

<button
class="btn-close"
data-bs-dismiss="toast">
</button>

</div>

<div
class="toast-body"
id="toastMessage">

Berhasil

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
